# @package _global_
# RGB (scene-cam) Diffusion Policy: image + robot proprioception only (NO privileged state),
# rgb-only (no depth), PlainConv encoder. Fixed image input -> the SAME policy
# can run across difficulties.
baseline_dir: diffusion_policy
script: train_rgbd.py
demo_kind: rgb
flags:
  obs_mode: rgb
  obs_camera: scene
  visual_encoder: plain_conv
  num_kp: 32
  total_iters: 30000
  batch_size: 128
  obs_horizon: 2
  act_horizon: 8
  pred_horizon: 16
  num_eval_envs: 4
  num_eval_episodes: 4
  eval_freq: 4000
  log_freq: 1000
  save_freq: 20000
  capture_video: false
  exp_name: warehouse_rgb_dp
